<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitta boken!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f4f6f9;min-height:100vh;color:#2d3748}
#hdr{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);padding:32px 24px 24px;text-align:center}
#hdr h1{color:#f1f5f9;font-size:1.6rem;margin:6px 0 4px;font-weight:700;letter-spacing:-.01em}
#hdr p{color:#94a3b8;font-size:.82rem;letter-spacing:.02em}
#bar{background:#1e293b;padding:14px 24px 18px;display:flex;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
#bar input{flex:1;padding:12px 16px;border-radius:10px;border:2px solid transparent;font-size:.95rem;background:#f1f5f9;color:#1e293b;outline:none;transition:border .2s}
#bar input:focus{border-color:#6366f1}
#bar button{padding:12px 24px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .2s}
#bar button:hover{background:#4f46e5}
#bar button:disabled{background:#475569;cursor:not-allowed}
#main{padding:24px 20px;max-width:720px;margin:0 auto}
.empty{text-align:center;margin-top:56px;color:#94a3b8}
.empty .ico{font-size:3rem;margin-bottom:14px;opacity:.7}
.empty p{font-size:.9rem;line-height:1.5;max-width:360px;margin:0 auto}
.lbl{color:#64748b;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;padding-left:4px}
.card{background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);margin-bottom:10px;border-left:4px solid #e2e8f0;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ch{display:flex;align-items:center;gap:12px}
.ci{font-size:1.5rem}
.cn{font-weight:700;color:#1e293b;font-size:.95rem}
.ct{color:#94a3b8;font-size:.75rem;margin-top:1px}
.found{border-radius:999px;padding:5px 14px;font-size:.78rem;font-weight:600;color:#fff;text-decoration:none;transition:opacity .2s}
.found:hover{opacity:.85}
.notfound{border-radius:999px;padding:5px 14px;font-size:.78rem;background:#f1f5f9;color:#94a3b8;font-weight:500}
.searching{font-size:.8rem;color:#94a3b8}
.err{font-size:.8rem;color:#ef4444}
.rlist{margin-top:12px}
.ritem{display:block;padding:8px 12px;background:#f8fafc;border-radius:8px;margin-bottom:6px;text-decoration:none;transition:background .15s}
.ritem:hover{background:#f1f5f9}
.rt{font-weight:600;font-size:.86rem;color:#1e293b}
.rm{font-size:.74rem;color:#64748b;margin-top:2px}
.vall{display:block;text-align:right;font-size:.78rem;font-weight:600;text-decoration:none;margin-top:4px;transition:opacity .2s}
.vall:hover{opacity:.7}
.lcard{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);margin-bottom:10px;text-decoration:none;border-left:4px solid #e2e8f0;transition:box-shadow .2s}
.lcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.larr{font-weight:600;font-size:.8rem}
</style>
</head>
<body>

<div id="hdr">
  <div style="font-size:1.75rem">&#128218;</div>
  <h1>Hitta boken!</h1>
  <p>e-Kirjasto &middot; Helmet &middot; Helle &middot; Audible &middot; BookBeat &middot; Storytel</p>
</div>

<div id="bar">
  <input id="q" type="text" placeholder="Search by title or author...">
  <button id="btn" onclick="go()">Search</button>
</div>

<div id="main">
  <div class="empty">
    <div class="ico">&#128269;</div>
    <p>Search across 6 platforms. Finnish libraries are checked live; streaming platforms open directly.</p>
  </div>
</div>

<script>
var FINNA = [
  {id:"ekirjasto", name:"e-Kirjasto", icon:"&#128215;", color:"#059669", type:"Free &middot; Finnish national digital library",
   filter:"filter%5B%5D=building%3A%220%2FNLF%2F%22&filter%5B%5D=online_boolean%3A%221%22",
   link:function(q){return "https://e-kirjasto.fi/en/search?query="+encodeURIComponent(q)}},
  {id:"helmet", name:"Helmet", icon:"&#128218;", color:"#6366f1", type:"Free &middot; Helsinki metro area libraries",
   filter:"filter%5B%5D=building%3A%220%2FHelmet%2F%22",
   link:function(q){return "https://helmet.finna.fi/Search/Results?lookfor="+encodeURIComponent(q)+"&type=AllFields"}},
  {id:"helle", name:"Helle", icon:"&#128217;", color:"#3b82f6", type:"Free &middot; P&auml;ij&auml;t-H&auml;me region libraries",
   filter:"filter%5B%5D=building%3A%220%2FHelle%2F%22",
   link:function(q){return "https://helle.finna.fi/Search/Results?lookfor="+encodeURIComponent(q)+"&type=AllFields"}}
];

var LINKS = [
  {name:"Audible",  icon:"&#127911;", color:"#f59e0b", type:"Purchase/subscription", link:function(q){return "https://www.audible.com/search?keywords="+encodeURIComponent(q)}},
  {name:"BookBeat", icon:"&#127897;", color:"#ef4444", type:"Subscription",          link:function(q){return "https://www.bookbeat.com/search?query="+encodeURIComponent(q)}},
  {name:"Storytel", icon:"&#128214;", color:"#8b5cf6", type:"Subscription",          link:function(q){return "https://www.storytel.com/search?q="+encodeURIComponent(q)}}
];

var busy = false;

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function searchFinna(src, query, cb) {
  var url = "https://api.finna.fi/api/v1/search?lookfor="+encodeURIComponent(query)+"&"+src.filter+"&field%5B%5D=title&field%5B%5D=authors&field%5B%5D=year&field%5B%5D=formats&limit=3&lng=en";
  fetch(url)
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(d){
      if(d.status !== "OK") throw new Error("API error");
      var recs = (d.records||[]).map(function(r){
        var author = "";
        if(r.authors && r.authors.primary) author = Object.keys(r.authors.primary)[0];
        else if(r.nonPresenterAuthors && r.nonPresenterAuthors[0]) author = r.nonPresenterAuthors[0].name;
        return {title:r.title||"", author:author, year:r.year||"", format:(r.formats&&r.formats[0]&&r.formats[0].translated)||""};
      });
      cb(null, recs);
    })
    .catch(function(e){ cb(e, null); });
}

function renderCard(src, state, query) {
  var loading = state.loading, error = state.error, results = state.results;
  var found = results && results.length > 0;
  var border = (loading||!found) ? "#e2e8f0" : src.color;

  var badge = "";
  if(loading) badge = '<span class="searching">Searching...</span>';
  else if(error) badge = '<span class="err">Error</span>';
  else if(found) badge = '<a href="'+src.link(query)+'" target="_blank" class="found" style="background:'+src.color+'">Found &rarr;</a>';
  else badge = '<span class="notfound">Not found</span>';

  var rhtml = "";
  if(found) {
    rhtml = '<div class="rlist">';
    for(var i=0;i<results.length;i++) {
      var r = results[i];
      var meta = [r.author, r.year, r.format].filter(Boolean).join(" &middot; ");
      rhtml += '<a href="'+src.link(query)+'" target="_blank" class="ritem"><div class="rt">'+esc(r.title)+'</div>'+(meta?'<div class="rm">'+meta+'</div>':'')+'</a>';
    }
    rhtml += '<a href="'+src.link(query)+'" target="_blank" class="vall" style="color:'+src.color+'">View all &rarr;</a></div>';
  }

  return '<div class="card" id="c-'+src.id+'" style="border-left-color:'+border+'"><div class="ch"><span class="ci">'+src.icon+'</span><div style="flex:1"><div class="cn">'+src.name+'</div><div class="ct">'+src.type+'</div></div>'+badge+'</div>'+rhtml+'</div>';
}

function updateCard(src, state, query) {
  var old = document.getElementById("c-"+src.id);
  if(!old) return;
  var tmp = document.createElement("div");
  tmp.innerHTML = renderCard(src, state, query);
  old.parentNode.replaceChild(tmp.firstChild, old);
}

function go() {
  var q = document.getElementById("q").value.trim();
  if(!q || busy) return;
  busy = true;
  document.getElementById("btn").textContent = "Searching...";
  document.getElementById("btn").disabled = true;

  var html = '<p style="color:#475569;margin-bottom:16px;font-size:.9rem">Results for <strong>'+esc(q)+'</strong>:</p>';
  html += '<div class="lbl">&#127467;&#127470; Finnish Libraries &mdash; live via Finna API</div>';
  for(var i=0;i<FINNA.length;i++) html += renderCard(FINNA[i], {loading:true}, q);
  html += '<div class="lbl">&#127911; Streaming &amp; Purchase</div>';
  for(var j=0;j<LINKS.length;j++) {
    var s = LINKS[j];
    html += '<a href="'+s.link(q)+'" target="_blank" class="lcard" style="border-left-color:'+s.color+'"><span class="ci">'+s.icon+'</span><div style="flex:1"><div class="cn">'+s.name+'</div><div class="ct">'+s.type+'</div></div><span class="larr" style="color:'+s.color+'">Search &rarr;</span></a>';
  }
  document.getElementById("main").innerHTML = html;

  var done = 0;
  for(var k=0;k<FINNA.length;k++) {
    (function(src){
      searchFinna(src, q, function(err, results){
        if(err) updateCard(src, {loading:false, error:true, results:null}, q);
        else updateCard(src, {loading:false, error:null, results:results}, q);
        done++;
        if(done === FINNA.length) {
          busy = false;
          document.getElementById("btn").textContent = "Search";
          document.getElementById("btn").disabled = false;
        }
      });
    })(FINNA[k]);
  }
}

document.getElementById("q").addEventListener("keydown", function(e){ if(e.key==="Enter") go(); });
</script>
</body>
</html>
